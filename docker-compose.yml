services:
  server:
    build: ./server
    env_file: ./server/.env
    environment:
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - chat-net

  client:
    build:
      context: ./client
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_SERVER_URL: ${VITE_SERVER_URL}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    environment:
      BACKEND_URL: http://server:5000
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - chat-net

networks:
  chat-net:
    driver: bridge
